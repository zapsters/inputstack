<!DOCTYPE html>
<html>
  <div class="mainContainer flex">
    <div class="signIn content">
      <h1>Create an Account</h1>
      <h2>The last step before hosting your next game.</h2>
      <h2 style="font-size: 17px">
        Note: Your information is used only for authentication. We recommend using google to
        automatically verify your email.
      </h2>
      <form id="signUp-form" autocomplete="off">
        <div class="input-container">
          <input required type="text" id="signUp-displayName" autocomplete="nickname" />
          <label>Display Name</label>
        </div>
        <div class="input-container">
          <input required type="text" id="signUp-email" autocomplete="email" />
          <label>Email</label>
        </div>
        <div class="input-container">
          <input required autocomplete="off" type="password" id="signUp-password" />
          <label>Password</label>
          <div tabindex="0" class="toggleVisibility">
            <img src="../images/eye-open.svg" alt="" srcset="" />
          </div>
        </div>
        <div class="input-container">
          <input required type="password" />
          <label>Re-enter Password</label>
          <div tabindex="0" class="toggleVisibility">
            <img src="../images/eye-open.svg" alt="" srcset="" />
          </div>
        </div>
        <span id="signUp-statusText"></span>
        <div class="input-container">
          <input type="submit" id="signUp-submit" value="Create Account" />
        </div>
      </form>
      <div class="orBox">
        <span>OR</span>
        <hr />
      </div>
      <a href="#signin" class="gsi-material-button">
        <div class="gsi-material-button-state"></div>
        <div class="gsi-material-button-content-wrapper">
          <span class="gsi-material-button-contents">Login to your Account</span>
        </div>
      </a>
      <button class="gsi-material-button googleSignIn" id="googleSignIn">
        <div class="gsi-material-button-state"></div>
        <div class="gsi-material-button-content-wrapper">
          <div class="gsi-material-button-icon">
            <svg
              version="1.1"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 48 48"
              xmlns:xlink="http://www.w3.org/1999/xlink"
              style="display: block">
              <path
                fill="#EA4335"
                d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
              <path
                fill="#4285F4"
                d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
              <path
                fill="#FBBC05"
                d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
              <path
                fill="#34A853"
                d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
              <path fill="none" d="M0 0h48v48H0z"></path>
            </svg>
          </div>
          <span class="gsi-material-button-contents">Sign in with Google</span>
          <span style="display: none">Sign in with Google</span>
        </div>
      </button>
    </div>
  </div>
</html>
